<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The 99">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0e8">
<title>The 99</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVGhlIDk5Iiwic2hvcnRfbmFtZSI6IlRoZSA5OSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjZjVmMGU4IiwidGhlbWVfY29sb3IiOiIjZjVmMGU4In0=">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body.light{background:#f5f0e8;color:#1a1610}
body.dark{background:#1a1610;color:#e8e0d4}
body{font-family:'Georgia',serif;transition:background 0.3s,color 0.3s}

.wrap{max-width:480px;margin:0 auto;padding:24px 20px 60px}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid;padding-bottom:8px;margin-bottom:20px}
.light .header{border-color:#1a1610}
.dark .header{border-color:#e8e0d4}
.title{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;letter-spacing:-0.02em}
.header-right{display:flex;align-items:baseline;gap:12px}
.date{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.04em}
.light .date{color:#8a7b66}
.dark .date{color:#a09080}
.mode-toggle{font-size:16px;cursor:pointer;background:none;border:none;padding:4px;line-height:1}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.stat{text-align:center;padding:14px 8px;border-radius:2px}
.light .stat{background:#ece5d8}
.dark .stat{background:#2a2520}
.stat-num{font-family:'Instrument Serif',serif;font-size:32px;line-height:1}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;margin-top:6px}
.light .stat-label{color:#8a7b66}
.dark .stat-label{color:#a09080}

/* MILESTONE */
.milestone{text-align:center;padding:8px;margin-bottom:16px;font-family:'Instrument Serif',serif;font-size:14px;font-style:italic;border-radius:2px;display:none}
.milestone.show{display:block}
.light .milestone{background:#b8893a22;color:#8a6a20}
.dark .milestone{background:#b8893a33;color:#d4a84a}

/* PROGRESS */
.progress{height:3px;margin-bottom:20px;border-radius:2px;overflow:hidden}
.light .progress{background:#ddd5c4}
.dark .progress{background:#332e24}
.progress-fill{height:100%;transition:width 0.4s ease}
.light .progress-fill{background:#1a1610}
.dark .progress-fill{background:#e8e0d4}

/* DAY LABEL */
.day-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px}
.light .day-label{color:#8a7b66}
.dark .day-label{color:#a09080}

/* DAYTYPE PICKER */
.daytype-picker{display:flex;gap:6px;margin-bottom:16px}
.daytype-btn{flex:1;padding:10px 8px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;text-align:center;border:1.5px solid transparent;border-radius:2px;cursor:pointer;transition:all 0.15s}
.light .daytype-btn{background:#ece5d8;color:#8a7b66}
.dark .daytype-btn{background:#2a2520;color:#a09080}
.light .daytype-btn.active{background:#1a1610;color:#f5f0e8;border-color:#1a1610}
.dark .daytype-btn.active{background:#e8e0d4;color:#1a1610;border-color:#e8e0d4}

/* SABBATH */
.sabbath-msg{text-align:center;padding:40px 20px;font-family:'Instrument Serif',serif;font-size:18px;font-style:italic;line-height:1.6}
.light .sabbath-msg{color:#8a7b66}
.dark .sabbath-msg{color:#a09080}

/* PILLARS */
.pillar-wrap{margin-bottom:6px}
.pillar{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:2px 2px 0 0;cursor:pointer;user-select:none;transition:background 0.15s,transform 0.15s;border:1.5px solid transparent}
.pillar-wrap:not(.expanded) .pillar{border-radius:2px}
.pillar:active{transform:scale(0.985)}
.light .pillar{background:#ece5d8}
.dark .pillar{background:#2a2520}
.light .pillar.done{background:#1a1610;color:#f5f0e8;border-color:#1a1610}
.dark .pillar.done{background:#e8e0d4;color:#1a1610;border-color:#e8e0d4}
.pillar.pop{animation:pop 0.3s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
.pillar-icon{font-size:16px;width:24px;text-align:center;opacity:0.4;transition:opacity 0.15s}
.pillar.done .pillar-icon{opacity:1}
.pillar-name{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.02em;flex:1}
.pillar-expand{font-size:10px;opacity:0.4;transition:transform 0.2s,opacity 0.15s;cursor:pointer;padding:4px}
.pillar-wrap.expanded .pillar-expand{transform:rotate(180deg)}
.pillar.done .pillar-expand{opacity:0.7}
.check{font-size:14px;opacity:0;transition:opacity 0.15s;margin-right:4px}
.pillar.done .check{opacity:1}

/* PILLAR NOTE */
.pillar-note{overflow:hidden;max-height:0;transition:max-height 0.25s ease,padding 0.25s ease;padding:0 16px}
.pillar-wrap.expanded .pillar-note{max-height:80px;padding:8px 16px 10px}
.light .pillar-note{background:#e4dbc9;border-radius:0 0 2px 2px}
.dark .pillar-note{background:#221e1a;border-radius:0 0 2px 2px}
.pillar-note input{width:100%;background:transparent;border:none;border-bottom:1px solid;padding:4px 0;font-family:'DM Mono',monospace;font-size:12px;outline:none}
.light .pillar-note input{border-color:#cbb89e;color:#1a1610}
.dark .pillar-note input{border-color:#4a4030;color:#e8e0d4}
.pillar-note input::placeholder{opacity:0.5}

/* FIELDS */
.field{margin-top:16px}
.field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;display:block;margin-bottom:6px}
.light .field label{color:#8a7b66}
.dark .field label{color:#a09080}
.field input,.field textarea{width:100%;border:1.5px solid transparent;padding:12px 14px;font-family:'DM Mono',monospace;font-size:13px;border-radius:2px;outline:none;transition:border-color 0.15s;resize:vertical}
.light .field input,.light .field textarea{background:#ece5d8;color:#1a1610}
.dark .field input,.dark .field textarea{background:#2a2520;color:#e8e0d4}
.light .field input:focus,.light .field textarea:focus{border-color:#1a1610}
.dark .field input:focus,.dark .field textarea:focus{border-color:#e8e0d4}
.field input::placeholder,.field textarea::placeholder{opacity:0.45}
.field textarea{min-height:70px;line-height:1.5}

/* ACTIONS */
.actions{display:flex;gap:8px;margin-top:24px;align-items:center}
.save{flex:1;border:none;padding:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.15s}
.light .save{background:#1a1610;color:#f5f0e8}
.dark .save{background:#e8e0d4;color:#1a1610}
.save.flash{background:#4a5a3c !important;color:#f5f0e8 !important}
.nav{background:transparent;border:1.5px solid;padding:14px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;border-radius:2px;transition:all 0.15s}
.light .nav{border-color:#cbb89e;color:#8a7b66}
.dark .nav{border-color:#4a4030;color:#a09080}
.nav:disabled{opacity:0.25;cursor:not-allowed}

/* VIEW LABEL */
.viewlabel{text-align:center;font-family:'DM Mono',monospace;font-size:10px;margin-top:12px;letter-spacing:0.06em}
.light .viewlabel{color:#8a7b66}
.dark .viewlabel{color:#a09080}

/* HEAT MAP */
.heatmap-toggle{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;text-align:center;cursor:pointer;padding:12px;margin-top:20px;border-radius:2px;transition:background 0.15s}
.light .heatmap-toggle{color:#8a7b66;background:#ece5d8}
.dark .heatmap-toggle{color:#a09080;background:#2a2520}
.heatmap{display:none;margin-top:12px;padding:16px;border-radius:2px}
.heatmap.show{display:block}
.light .heatmap{background:#ece5d8}
.dark .heatmap{background:#2a2520}
.heatmap-grid{display:grid;grid-template-columns:repeat(11,1fr);gap:4px}
.hm-cell{aspect-ratio:1;border-radius:2px;cursor:pointer;position:relative;transition:transform 0.1s}
.hm-cell:active{transform:scale(0.9)}
.hm-cell .hm-tip{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:8px;white-space:nowrap;padding:2px 6px;border-radius:2px;z-index:10}
.light .hm-empty{background:#ddd5c4}
.dark .hm-empty{background:#332e24}
.light .hm-partial{background:#c3a86a}
.dark .hm-partial{background:#8a6a2a}
.light .hm-full{background:#4a5a3c}
.dark .hm-full{background:#6a8a4c}
.light .hm-sabbath{background:#b0a48e}
.dark .hm-sabbath{background:#5a5040}
.light .hm-future{background:#eee8de}
.dark .hm-future{background:#252018}
.hm-label{font-family:'DM Mono',monospace;font-size:8px;text-align:center;margin-top:8px}
.light .hm-label{color:#8a7b66}
.dark .hm-label{color:#a09080}
.hm-legend{display:flex;gap:10px;justify-content:center;margin-top:10px;font-family:'DM Mono',monospace;font-size:9px}
.hm-legend span{display:flex;align-items:center;gap:4px}
.hm-legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block}

/* SUNDAY REVIEW */
.review-toggle{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;text-align:center;cursor:pointer;padding:12px;margin-top:8px;border-radius:2px;transition:background 0.15s}
.light .review-toggle{color:#8a7b66;background:#ece5d8}
.dark .review-toggle{color:#a09080;background:#2a2520}
.review{display:none;margin-top:8px;padding:16px;border-radius:2px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7}
.review.show{display:block}
.light .review{background:#ece5d8;color:#1a1610}
.dark .review{background:#2a2520;color:#e8e0d4}
.review h3{font-family:'Instrument Serif',serif;font-size:18px;font-weight:400;margin-bottom:12px}
.review-day{margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed}
.light .review-day{border-color:#cbb89e}
.dark .review-day{border-color:#4a4030}
.review-day:last-child{border:none;margin:0;padding:0}
.review-day-name{font-weight:500;margin-bottom:2px}
.review-pillar-status{font-size:11px;opacity:0.7}
.review-note{font-size:11px;font-style:italic;opacity:0.6;margin-top:2px}
.review-summary{margin-top:12px;padding-top:12px;border-top:1px solid;font-size:13px}
.light .review-summary{border-color:#cbb89e}
.dark .review-summary{border-color:#4a4030}

/* FOOTER */
.footer{margin-top:28px;padding-top:16px;border-top:1px dashed;font-family:'Instrument Serif',serif;font-size:13px;text-align:center;font-style:italic;line-height:1.6}
.light .footer{border-color:#cbb89e;color:#8a7b66}
.dark .footer{border-color:#4a4030;color:#a09080}
</style>
</head>
<body class="light">
<div class="wrap" id="app"></div>
<script>
(function(){
const BIRTHDAY=new Date(2026,7,25),START=new Date(2026,4,18),TOTAL=99;
const PILLARS_WEEK=[
  {key:"prayer",label:"Prayer / Bible",icon:"✦",ph:"e.g. Read Psalms 23, prayed for Sam..."},
  {key:"exercise",label:"Exercise — 30 min",icon:"◆",ph:"e.g. Upper body gym, ran 2 miles..."},
  {key:"screenplay",label:"Screenplay — 30 min",icon:"▣",ph:"e.g. Wrote 3 pages, outlined Act 2..."},
  {key:"business",label:"BMGB",icon:"◉",ph:"e.g. Emailed Acutrack, revised cover..."}
];
const PILLARS_LIGHT=[
  {key:"prayer",label:"Prayer / Bible",icon:"✦",ph:"e.g. Read Psalms 23, prayed for Sam..."},
  {key:"exercise",label:"Exercise — 15 min",icon:"◆",ph:"e.g. Quick walk, stretching..."},
  {key:"screenplay",label:"Screenplay — 15 min",icon:"▣",ph:"e.g. Freewrite, read dialogue aloud..."},
  {key:"business",label:"BMGB",icon:"◉",ph:"e.g. Emailed Acutrack, revised cover..."}
];
const QUOTES=[
  "Ignition was never your problem. This is for the ninety-ninth day, not the first.",
  "A season with a hard edge on both ends.",
  "The streak can't lie to you about the pillar that drifts.",
  "Every action is a vote for the type of person you're becoming.",
  "Don't just set goals — define who you want to become.",
  "Your weakness isn't drive — it's sustained consistency.",
  "Systems, not willpower. That's how you build this.",
  "The shiny new thing ate the morning. Don't let it eat the season.",
  "Strong ignition, weak follow-through — not anymore.",
  "What you do today compounds. Don't waste the window."
];
const MILESTONES={1:"Day 1. It starts now.",10:"Day 10. Double digits. Still here.",25:"Quarter mark. 25 down, 74 to go.",30:"One month in. The habit is forming.",50:"Halfway. Most people quit by now. You didn't.",60:"60 days. Two months of showing up.",75:"Three quarters done. The finish line is real.",90:"Single digits left. Close it out.",99:"Day 99. You did it. Happy birthday eve."};
const STORE_KEY="the99_data";
const MODE_KEY="the99_mode";
let entries=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");
let viewDate=new Date();
let darkMode=localStorage.getItem(MODE_KEY)==="dark";
let expandedPillars={};
let showHeatmap=false;
let showReview=false;
let touchStartX=0;

function applyMode(){document.body.className=darkMode?"dark":"light";localStorage.setItem(MODE_KEY,darkMode?"dark":"light")}
applyMode();

function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dayNum(d){const a=new Date(d.getFullYear(),d.getMonth(),d.getDate()),b=new Date(START.getFullYear(),START.getMonth(),START.getDate());return Math.floor((a-b)/864e5)+1}
function rem(){const t=new Date(),a=new Date(t.getFullYear(),t.getMonth(),t.getDate()),b=new Date(BIRTHDAY.getFullYear(),BIRTHDAY.getMonth(),BIRTHDAY.getDate());return Math.max(0,Math.floor((b-a)/864e5))}
function fmt(d){const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],mos=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return days[d.getDay()]+", "+mos[d.getMonth()]+" "+d.getDate()}
function fmtShort(d){const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];return days[d.getDay()]}
function isWknd(d){const x=d.getDay();return x===0||x===6}
function empty(){return{pillars:{prayer:false,exercise:false,screenplay:false,business:false},pillarNotes:{prayer:"",exercise:"",screenplay:"",business:""},bizTask:"",notes:"",dayType:"active"}}
function getEntry(k){const e=entries[k]||empty();if(!e.pillarNotes)e.pillarNotes={prayer:"",exercise:"",screenplay:"",business:""};return e}
function persist(){localStorage.setItem(STORE_KEY,JSON.stringify(entries))}
function saveCurrent(){
  const k=dk(viewDate),e=getEntry(k);
  const biz=document.getElementById("biz");if(biz)e.bizTask=biz.value;
  const notes=document.getElementById("notes");if(notes)e.notes=notes.value;
  ["prayer","exercise","screenplay","business"].forEach(p=>{
    const inp=document.getElementById("pn-"+p);if(inp)e.pillarNotes[p]=inp.value;
  });
  entries[k]=e;persist();
}

function stats(){
  let streak=0,logged=0,best=0,cur=0;
  const c=new Date(),sf=new Date(START.getFullYear(),START.getMonth(),START.getDate());
  for(let i=0;i<TOTAL;i++){
    if(c<sf)break;const k=dk(c),e=entries[k];
    if(e){const dt=e.dayType||"active";
      if(dt==="sabbath"){if(i===streak)streak++;logged++;cur++}
      else{const all=Object.values(e.pillars).every(Boolean);if(all&&i===streak)streak++;if(all)cur++;else cur=0;if(Object.values(e.pillars).some(Boolean))logged++}
    }else{cur=0}
    if(cur>best)best=cur;
    c.setDate(c.getDate()-1);
  }return{streak,logged,best}
}

function getWeekReview(){
  const today=new Date();
  const sun=new Date(today);sun.setDate(today.getDate()-today.getDay());
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(sun);d.setDate(sun.getDate()+i);
    if(d>today)break;
    const k=dk(d),e=entries[k];
    days.push({date:d,key:k,entry:e||null,dayName:fmtShort(d)+" "+d.getDate()});
  }
  let totalPillars=0,donePillars=0,sabbaths=0;
  days.forEach(d=>{
    if(!d.entry)return;
    const dt=d.entry.dayType||"active";
    if(dt==="sabbath"){sabbaths++;return}
    totalPillars+=4;
    donePillars+=Object.values(d.entry.pillars).filter(Boolean).length;
  });
  return{days,totalPillars,donePillars,sabbaths,pct:totalPillars?Math.round((donePillars/totalPillars)*100):0};
}

function quoteOfDay(){const d=new Date();const idx=(d.getFullYear()*1000+dayNum(d))%QUOTES.length;return QUOTES[idx]}

function render(){
  const today=new Date(),tKey=dk(today),cKey=dk(viewDate),isToday=cKey===tKey;
  const dn=dayNum(viewDate),remaining=rem(),wknd=isWknd(viewDate);
  const entry=getEntry(cKey),dt=entry.dayType||"active",isSab=dt==="sabbath",isLt=dt==="light";
  const pillars=isLt?PILLARS_LIGHT:PILLARS_WEEK;
  const {streak:st,logged:lg,best:bst}=stats();
  const done=isSab?0:Object.values(entry.pillars).filter(Boolean).length;
  const sf=new Date(START.getFullYear(),START.getMonth(),START.getDate());
  const prevD=new Date(viewDate);prevD.setDate(prevD.getDate()-1);
  const canBack=prevD>=sf;
  const ms=MILESTONES[dn]||"";

  let h="";

  // Header
  h+=`<div class="header"><div class="title">The 99</div><div class="header-right"><div class="date">${fmt(viewDate)}</div><button class="mode-toggle" onclick="toggleMode()">${darkMode?"☀️":"🌙"}</button></div></div>`;

  // Stats
  h+=`<div class="stats"><div class="stat"><div class="stat-num">${st}</div><div class="stat-label">Streak</div></div><div class="stat"><div class="stat-num">${lg}</div><div class="stat-label">Logged</div></div><div class="stat"><div class="stat-num">${remaining}</div><div class="stat-label">Days Left</div></div></div>`;

  // Milestone
  h+=`<div class="milestone${ms?" show":""}">${ms}</div>`;

  // Progress
  h+=`<div class="progress"><div class="progress-fill" style="width:${Math.min(100,((TOTAL-remaining)/TOTAL)*100)}%"></div></div>`;

  // Day label
  const dayLabel=dn>=1&&dn<=TOTAL?(isSab?`Day ${dn} of 99 — Sabbath`:isLt?`Day ${dn} of 99 — Light day · ${done}/4`:`Day ${dn} of 99 — ${done}/4`):dn<1?"Before the 99":"After the 99";
  h+=`<div class="day-label">${dayLabel}</div>`;

  // Weekend picker
  if(wknd){
    h+=`<div class="daytype-picker"><button class="daytype-btn${isSab?" active":""}" onclick="setType('sabbath')">Sabbath (off)</button><button class="daytype-btn${isLt?" active":""}" onclick="setType('light')">Light day</button></div>`;
  }

  if(isSab){
    h+=`<div class="sabbath-msg">Rest. The streak holds.<br>Save the day to log it.</div>`;
  }else{
    // Pillars with expandable notes
    pillars.forEach(p=>{
      const d=entry.pillars[p.key];
      const exp=expandedPillars[p.key];
      const noteVal=(entry.pillarNotes&&entry.pillarNotes[p.key])||"";
      h+=`<div class="pillar-wrap${exp?" expanded":""}">`;
      h+=`<div class="pillar${d?" done":""}" onclick="toggle('${p.key}')"><span class="pillar-icon">${p.icon}</span><span class="pillar-name">${p.label}</span><span class="check">✓</span><span class="pillar-expand" onclick="event.stopPropagation();toggleExpand('${p.key}')">▼</span></div>`;
      h+=`<div class="pillar-note"><input type="text" id="pn-${p.key}" value="${(noteVal).replace(/"/g,"&quot;")}" placeholder="${p.ph}" oninput="updatePillarNote('${p.key}',this.value)"></div>`;
      h+=`</div>`;
    });

    // Biz task
    h+=`<div class="field"><label>#1 Business Task — name the output</label><input type="text" id="biz" value="${(entry.bizTask||"").replace(/"/g,"&quot;")}" placeholder='"Finish cover revisions" — not "worked on it"' oninput="autoSaveField()"></div>`;

    // Notes
    h+=`<div class="field"><label>Notes</label><textarea id="notes" placeholder="Wins, misses, what's in the way. Sunday review reads this." oninput="autoSaveField()">${entry.notes||""}</textarea></div>`;
  }

  // Actions
  h+=`<div class="actions"><button class="nav" onclick="shift(-1)"${canBack?"":" disabled"}>←</button><button class="save" id="savebtn" onclick="manualSave()">Saved ✓</button><button class="nav" onclick="shift(1)"${isToday?" disabled":""}>→</button></div>`;
  h+=`<div class="viewlabel">${isToday?"Today — auto-saves as you go.":"Viewing "+fmt(viewDate)+" — tap → to return"}</div>`;

  // Heat map toggle
  h+=`<div class="heatmap-toggle" onclick="toggleHeatmap()">${showHeatmap?"Hide heat map ▲":"Heat map ▼"}</div>`;
  h+=`<div class="heatmap${showHeatmap?" show":""}">`;
  h+=buildHeatmap();
  h+=`</div>`;

  // Sunday review toggle
  h+=`<div class="review-toggle" onclick="toggleReview()">${showReview?"Hide week review ▲":"Sunday review ▼"}</div>`;
  h+=`<div class="review${showReview?" show":""}">`;
  h+=buildReview();
  h+=`</div>`;

  // Footer quote
  h+=`<div class="footer">${quoteOfDay()}</div>`;

  document.getElementById("app").innerHTML=h;
}

function buildHeatmap(){
  let h=`<div class="heatmap-grid">`;
  const today=new Date();
  for(let i=1;i<=TOTAL;i++){
    const d=new Date(START);d.setDate(START.getDate()+i-1);
    const k=dk(d),e=entries[k];
    const isFuture=d>today;
    let cls="hm-future";
    if(!isFuture){
      if(!e)cls="hm-empty";
      else if((e.dayType||"active")==="sabbath")cls="hm-sabbath";
      else{
        const cnt=Object.values(e.pillars).filter(Boolean).length;
        cls=cnt===4?"hm-full":cnt>0?"hm-partial":"hm-empty";
      }
    }
    h+=`<div class="hm-cell ${cls}" onclick="jumpTo(${d.getFullYear()},${d.getMonth()},${d.getDate()})" title="Day ${i}">${i}</div>`;
  }
  h+=`</div>`;
  h+=`<div class="hm-legend"><span><span class="hm-legend-dot hm-full"></span>4/4</span><span><span class="hm-legend-dot hm-partial"></span>Partial</span><span><span class="hm-legend-dot hm-sabbath"></span>Sabbath</span><span><span class="hm-legend-dot hm-empty"></span>Missed</span></div>`;
  return h;
}

function buildReview(){
  const rv=getWeekReview();
  let h=`<h3>This Week</h3>`;
  rv.days.forEach(d=>{
    h+=`<div class="review-day">`;
    h+=`<div class="review-day-name">${d.dayName}</div>`;
    if(!d.entry){
      h+=`<div class="review-pillar-status">No entry</div>`;
    }else if((d.entry.dayType||"active")==="sabbath"){
      h+=`<div class="review-pillar-status">Sabbath — rest day</div>`;
    }else{
      const p=d.entry.pillars;
      const icons=["prayer","exercise","screenplay","business"].map(k=>p[k]?"✓":"✗").join(" ");
      h+=`<div class="review-pillar-status">${icons} (${Object.values(p).filter(Boolean).length}/4)</div>`;
      if(d.entry.bizTask)h+=`<div class="review-note">Biz: ${d.entry.bizTask}</div>`;
      // Show pillar notes
      if(d.entry.pillarNotes){
        ["prayer","exercise","screenplay","business"].forEach(k=>{
          if(d.entry.pillarNotes[k])h+=`<div class="review-note">${k}: ${d.entry.pillarNotes[k]}</div>`;
        });
      }
      if(d.entry.notes)h+=`<div class="review-note">${d.entry.notes}</div>`;
    }
    h+=`</div>`;
  });
  h+=`<div class="review-summary">${rv.pct}% pillars hit this week (${rv.donePillars}/${rv.totalPillars})${rv.sabbaths?` · ${rv.sabbaths} sabbath${rv.sabbaths>1?"s":""}`:""}</div>`;
  return h;
}

// AUTO-SAVE debounce
let saveTimer=null;
function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{saveCurrent()},600);
}

window.autoSaveField=function(){autoSave()};

window.toggle=function(key){
  saveCurrent();
  const k=dk(viewDate),e=getEntry(k);
  e.pillars[key]=!e.pillars[key];entries[k]=e;persist();render();
};

window.updatePillarNote=function(key,val){
  const k=dk(viewDate),e=getEntry(k);
  if(!e.pillarNotes)e.pillarNotes={prayer:"",exercise:"",screenplay:"",business:""};
  e.pillarNotes[key]=val;entries[k]=e;autoSave();
};

window.toggleExpand=function(key){
  expandedPillars[key]=!expandedPillars[key];render();
};

window.setType=function(t){
  saveCurrent();
  const k=dk(viewDate),e=getEntry(k);e.dayType=t;entries[k]=e;
  const vd=new Date(viewDate),od=new Date(vd);
  if(vd.getDay()===0)od.setDate(vd.getDate()-1);else od.setDate(vd.getDate()+1);
  const ok=dk(od),oe=getEntry(ok);
  oe.dayType=t==="sabbath"?"light":"sabbath";entries[ok]=oe;
  persist();render();
};

window.manualSave=function(){
  saveCurrent();
  const btn=document.getElementById("savebtn");btn.classList.add("flash");btn.textContent="Saved ✓";
  setTimeout(()=>{btn.classList.remove("flash");btn.textContent="Saved ✓"},1200);
};

window.shift=function(dir){
  saveCurrent();
  const d=new Date(viewDate);d.setDate(d.getDate()+dir);
  const sf=new Date(START.getFullYear(),START.getMonth(),START.getDate()),today=new Date();
  if(d>=sf&&d<=today){viewDate=d;expandedPillars={};render()}
};

window.jumpTo=function(y,m,day){
  saveCurrent();
  const d=new Date(y,m,day),today=new Date(),sf=new Date(START.getFullYear(),START.getMonth(),START.getDate());
  if(d>=sf&&d<=today){viewDate=d;expandedPillars={};render()}
};

window.toggleMode=function(){darkMode=!darkMode;applyMode();render()};
window.toggleHeatmap=function(){showHeatmap=!showHeatmap;render()};
window.toggleReview=function(){showReview=!showReview;render()};

// Swipe
document.addEventListener("touchstart",function(e){touchStartX=e.changedTouches[0].screenX},{passive:true});
document.addEventListener("touchend",function(e){
  const dx=e.changedTouches[0].screenX-touchStartX;
  if(Math.abs(dx)>80){
    if(dx>0)window.shift(-1);else window.shift(1);
  }
},{passive:true});

render();
})();
</script>
