<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The 99">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0e8">
<title>The 99</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVGhlIDk5Iiwic2hvcnRfbmFtZSI6IlRoZSA5OSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjZjVmMGU4IiwidGhlbWVfY29sb3IiOiIjZjVmMGU4In0=">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f5f0e8;font-family:'Georgia',serif;color:#1a1610;min-height:100vh;-webkit-tap-highlight-color:transparent}
.wrap{max-width:480px;margin:0 auto;padding:24px 20px 60px}
.header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #1a1610;padding-bottom:8px;margin-bottom:28px}
.title{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;letter-spacing:-0.02em}
.date{font-family:'DM Mono',monospace;font-size:11px;color:#8a7b66;letter-spacing:0.04em}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px}
.stat{text-align:center;padding:14px 8px;background:#ece5d8;border-radius:2px}
.stat-num{font-family:'Instrument Serif',serif;font-size:32px;line-height:1;color:#1a1610}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#8a7b66;margin-top:6px}
.progress{height:3px;background:#ddd5c4;margin-bottom:28px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#1a1610;transition:width 0.4s ease}
.day-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8a7b66;margin-bottom:12px}
.pillar{display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:6px;background:#ece5d8;border-radius:2px;cursor:pointer;user-select:none;transition:background 0.15s,transform 0.15s;border:1.5px solid transparent}
.pillar:active{transform:scale(0.985)}
.pillar.done{background:#1a1610;color:#f5f0e8;border-color:#1a1610}
.pillar.pop{animation:pop 0.3s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
.pillar-icon{font-size:16px;width:24px;text-align:center;opacity:0.4;transition:opacity 0.15s}
.pillar.done .pillar-icon{opacity:1}
.pillar-name{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.02em;flex:1}
.check{font-size:14px;opacity:0;transition:opacity 0.15s}
.pillar.done .check{opacity:1}
.field{margin-top:16px}
.field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#8a7b66;display:block;margin-bottom:6px}
.field input,.field textarea{width:100%;background:#ece5d8;border:1.5px solid transparent;padding:12px 14px;font-family:'DM Mono',monospace;font-size:13px;color:#1a1610;border-radius:2px;outline:none;transition:border-color 0.15s;resize:vertical}
.field input:focus,.field textarea:focus{border-color:#1a1610}
.field input::placeholder,.field textarea::placeholder{color:#b0a48e}
.field textarea{min-height:70px;line-height:1.5}
.actions{display:flex;gap:8px;margin-top:24px;align-items:center}
.save{flex:1;background:#1a1610;color:#f5f0e8;border:none;padding:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.15s}
.save:hover{background:#332e24}
.save.flash{background:#4a5a3c}
.nav{background:transparent;border:1.5px solid #cbb89e;color:#8a7b66;padding:14px 14px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;border-radius:2px;transition:all 0.15s}
.nav:hover{border-color:#1a1610;color:#1a1610}
.nav:disabled{opacity:0.25;cursor:not-allowed}
.viewlabel{text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:#8a7b66;margin-top:12px;letter-spacing:0.06em}
.footer{margin-top:36px;padding-top:16px;border-top:1px dashed #cbb89e;font-family:'Instrument Serif',serif;font-size:13px;color:#8a7b66;text-align:center;font-style:italic;line-height:1.6}
.daytype-picker{display:flex;gap:6px;margin-bottom:16px}
.daytype-btn{flex:1;padding:10px 8px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;text-align:center;background:#ece5d8;border:1.5px solid transparent;border-radius:2px;cursor:pointer;transition:all 0.15s;color:#8a7b66}
.daytype-btn:hover{background:#e4dbc9}
.daytype-btn.active{background:#1a1610;color:#f5f0e8;border-color:#1a1610}
.sabbath-msg{text-align:center;padding:40px 20px;font-family:'Instrument Serif',serif;font-size:18px;color:#8a7b66;font-style:italic;line-height:1.6}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
(function(){
const BIRTHDAY=new Date(2026,7,25),START=new Date(2026,4,18),TOTAL=99;
const PILLARS_WEEK=[
  {key:"prayer",label:"Prayer / Bible",icon:"✦"},
  {key:"exercise",label:"Exercise — 30 min",icon:"◆"},
  {key:"screenplay",label:"Screenplay — 30 min",icon:"▣"},
  {key:"business",label:"BMGB",icon:"◉"}
];
const PILLARS_LIGHT=[
  {key:"prayer",label:"Prayer / Bible",icon:"✦"},
  {key:"exercise",label:"Exercise — 15 min",icon:"◆"},
  {key:"screenplay",label:"Screenplay — 15 min",icon:"▣"},
  {key:"business",label:"BMGB",icon:"◉"}
];
const STORE_KEY="the99_data";
let entries=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");
let viewDate=new Date();

function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dayNum(d){const a=new Date(d.getFullYear(),d.getMonth(),d.getDate()),b=new Date(START.getFullYear(),START.getMonth(),START.getDate());return Math.floor((a-b)/864e5)+1}
function remaining(){const t=new Date(),a=new Date(t.getFullYear(),t.getMonth(),t.getDate()),b=new Date(BIRTHDAY.getFullYear(),BIRTHDAY.getMonth(),BIRTHDAY.getDate());return Math.max(0,Math.floor((b-a)/864e5))}
function fmt(d){const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],mos=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return days[d.getDay()]+", "+mos[d.getMonth()]+" "+d.getDate()}
function isWknd(d){const x=d.getDay();return x===0||x===6}
function empty(){return{pillars:{prayer:false,exercise:false,screenplay:false,business:false},bizTask:"",notes:"",dayType:"active"}}
function getEntry(k){return entries[k]||empty()}
function persist(){localStorage.setItem(STORE_KEY,JSON.stringify(entries))}

function stats(){
  let streak=0,logged=0;const c=new Date(),sf=new Date(START.getFullYear(),START.getMonth(),START.getDate());
  for(let i=0;i<TOTAL;i++){
    if(c<sf)break;const k=dk(c),e=entries[k];
    if(e){const dt=e.dayType||"active";
      if(dt==="sabbath"){if(i===streak)streak++;logged++}
      else{const all=Object.values(e.pillars).every(Boolean);if(all&&i===streak)streak++;if(Object.values(e.pillars).some(Boolean))logged++}
    }c.setDate(c.getDate()-1)
  }return{streak,logged}
}

function render(){
  const today=new Date(),tKey=dk(today),cKey=dk(viewDate),isToday=cKey===tKey;
  const dn=dayNum(viewDate),rem=remaining(),wknd=isWknd(viewDate);
  const entry=getEntry(cKey),dt=entry.dayType||"active",isSab=dt==="sabbath",isLt=dt==="light";
  const pillars=isLt?PILLARS_LIGHT:PILLARS_WEEK;
  const {streak:st,logged:lg}=stats();
  const done=isSab?0:Object.values(entry.pillars).filter(Boolean).length;
  const sf=new Date(START.getFullYear(),START.getMonth(),START.getDate());
  const prevD=new Date(viewDate);prevD.setDate(prevD.getDate()-1);
  const canBack=prevD>=sf;

  let h=`<div class="header"><div class="title">The 99</div><div class="date">${fmt(viewDate)}</div></div>`;
  h+=`<div class="stats"><div class="stat"><div class="stat-num">${st}</div><div class="stat-label">Streak</div></div><div class="stat"><div class="stat-num">${lg}</div><div class="stat-label">Logged</div></div><div class="stat"><div class="stat-num">${rem}</div><div class="stat-label">Days Left</div></div></div>`;
  h+=`<div class="progress"><div class="progress-fill" style="width:${Math.min(100,((TOTAL-rem)/TOTAL)*100)}%"></div></div>`;

  const dayLabel=dn>=1&&dn<=TOTAL?(isSab?`Day ${dn} of 99 — Sabbath`:isLt?`Day ${dn} of 99 — Light day · ${done}/4`:`Day ${dn} of 99 — ${done}/4`):dn<1?"Before the 99":"After the 99";
  h+=`<div class="day-label">${dayLabel}</div>`;

  if(wknd){
    h+=`<div class="daytype-picker"><button class="daytype-btn${isSab?" active":""}" onclick="setType('sabbath')">Sabbath (off)</button><button class="daytype-btn${isLt?" active":""}" onclick="setType('light')">Light day</button></div>`;
  }

  if(isSab){
    h+=`<div class="sabbath-msg">Rest. The streak holds.<br>Save the day to log it.</div>`;
  }else{
    pillars.forEach(p=>{
      const d=entry.pillars[p.key];
      h+=`<div class="pillar${d?" done":""}" onclick="toggle('${p.key}')"><span class="pillar-icon">${p.icon}</span><span class="pillar-name">${p.label}</span><span class="check">✓</span></div>`;
    });
    h+=`<div class="field"><label>#1 Business Task — name the output</label><input type="text" id="biz" value="${(entry.bizTask||"").replace(/"/g,"&quot;")}" placeholder='"Finish cover revisions" — not "worked on it"' oninput="updateBiz(this.value)"></div>`;
    h+=`<div class="field"><label>Notes</label><textarea id="notes" placeholder="Wins, misses, what's in the way. Sunday review reads this." oninput="updateNotes(this.value)">${entry.notes||""}</textarea></div>`;
  }

  h+=`<div class="actions"><button class="nav" onclick="shift(-1)"${canBack?"":" disabled"}>←</button><button class="save" id="savebtn" onclick="save()">Save the day</button><button class="nav" onclick="shift(1)"${isToday?" disabled":""}>→</button></div>`;
  h+=`<div class="viewlabel">${isToday?"Today — tap pillars, name the task, save.":"Viewing "+fmt(viewDate)+" — tap → to return"}</div>`;
  h+=`<div class="footer">Ignition was never your problem.<br>This is for the ninety-ninth day, not the first.</div>`;
  document.getElementById("app").innerHTML=h;
}

window.toggle=function(key){
  const k=dk(viewDate),e=getEntry(k);
  e.pillars[key]=!e.pillars[key];entries[k]=e;persist();render();
};
window.updateBiz=function(v){const k=dk(viewDate),e=getEntry(k);e.bizTask=v;entries[k]=e};
window.updateNotes=function(v){const k=dk(viewDate),e=getEntry(k);e.notes=v;entries[k]=e};
window.setType=function(t){
  const k=dk(viewDate),e=getEntry(k);e.dayType=t;entries[k]=e;
  const vd=new Date(viewDate),od=new Date(vd);
  if(vd.getDay()===0)od.setDate(vd.getDate()-1);else od.setDate(vd.getDate()+1);
  const ok=dk(od),oe=getEntry(ok);
  oe.dayType=t==="sabbath"?"light":"sabbath";entries[ok]=oe;
  persist();render();
};
window.save=function(){
  const k=dk(viewDate),e=getEntry(k);
  const biz=document.getElementById("biz");if(biz)e.bizTask=biz.value;
  const notes=document.getElementById("notes");if(notes)e.notes=notes.value;
  entries[k]=e;persist();
  const btn=document.getElementById("savebtn");btn.classList.add("flash");btn.textContent="Saved ✓";
  setTimeout(()=>{btn.classList.remove("flash");btn.textContent="Save the day"},1200);
};
window.shift=function(dir){
  const d=new Date(viewDate);d.setDate(d.getDate()+dir);
  const sf=new Date(START.getFullYear(),START.getMonth(),START.getDate()),today=new Date();
  if(d>=sf&&d<=today){
    // persist current text fields before navigating
    const k=dk(viewDate),e=getEntry(k);
    const biz=document.getElementById("biz");if(biz)e.bizTask=biz.value;
    const notes=document.getElementById("notes");if(notes)e.notes=notes.value;
    entries[k]=e;persist();
    viewDate=d;render();
  }
};

render();
})();
</script>
</body>
</html>
